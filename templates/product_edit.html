{% extends "base.html" %}

{% block title %}Edit Product - Student Marketplace{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0"><i class="bi bi-pencil"></i> Edit Product</h3>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('product_edit', product_id=product.product_id) }}"
                        enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="name" class="form-label">Product Name *</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ product.name }}"
                                required>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description *</label>
                            <textarea class="form-control" id="description" name="description" rows="4"
                                required>{{ product.description }}</textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="price" class="form-label">Price (₹) *</label>
                                <input type="number" class="form-control" id="price" name="price" step="0.01" min="0.01"
                                    value="{{ product.price }}" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="category" class="form-label">Category *</label>
                                <select class="form-select" id="category" name="category" required>
                                    <option value="Books" {% if product.category=='Books' %}selected{% endif %}>Books
                                    </option>
                                    <option value="Gadgets" {% if product.category=='Gadgets' %}selected{% endif %}>
                                        Gadgets</option>
                                    <option value="Accessories" {% if product.category=='Accessories' %}selected{% endif
                                        %}>Accessories</option>
                                    <option value="Electronics" {% if product.category=='Electronics' %}selected{% endif
                                        %}>Electronics</option>
                                    <option value="Clothing" {% if product.category=='Clothing' %}selected{% endif %}>
                                        Clothing</option>
                                    <option value="Other" {% if product.category=='Other' %}selected{% endif %}>Other
                                    </option>
                                </select>
                            </div>
                        </div>



                        <div class="mb-3">
                            <label for="image" class="form-label">New Product Image (Optional)</label>
                            <input type="file" class="form-control" id="image" name="image" accept="image/*">
                            <small class="form-text text-muted">Leave empty to keep current image</small>
                        </div>

                        <div class="alert alert-info">
                            <i class="bi bi-info-circle"></i> Your product will need admin approval again after editing.
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Update Product</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
