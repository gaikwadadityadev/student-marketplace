{% extends "base.html" %}

{% block title %}Admin Portal - Student Marketplace{% endblock %}

{% block extra_css %}
<style>
    .admin-auth-page {
        min-height: calc(100vh - 150px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1rem;
        background-color: #0F172A; /* Dark slate */
        position: relative;
        overflow: hidden;
    }

    /* Dark mode background elements */
    .admin-auth-page::before {
        content: '';
        position: absolute;
        top: -10%; left: -10%;
        width: 400px; height: 400px;
        background: radial-gradient(circle, rgba(79, 70, 229, 0.15) 0%, transparent 70%);
        border-radius: 50%;
    }

    .admin-auth-page::after {
        content: '';
        position: absolute;
        bottom: -10%; right: -10%;
        width: 400px; height: 400px;
        background: radial-gradient(circle, rgba(239, 68, 68, 0.1) 0%, transparent 70%);
        border-radius: 50%;
    }

    .auth-card {
        background: rgba(30, 41, 59, 0.7); /* Slightly transparent slate */
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-radius: var(--radius-xl);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 100%;
        max-width: 480px;
        padding: 3rem;
        position: relative;
        z-index: 10;
        animation: fadeInUp 0.5s ease-out;
    }

    .auth-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--danger), var(--warning));
    }

    .auth-header {
        text-align: center;
        margin-bottom: 2.5rem;
    }

    .auth-header i {
        font-size: 2.5rem;
        background: linear-gradient(135deg, var(--danger), var(--warning));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 1rem;
        display: inline-block;
    }

    .auth-header h1 {
        font-size: 1.75rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
        color: #F8FAFC;
    }

    .auth-header p {
        color: #94A3B8;
        font-size: 0.95rem;
    }

    /* Dark mode form inputs */
    .form-floating > label {
        color: #94A3B8;
        padding-left: 1.25rem;
    }

    .form-floating > .form-control {
        padding-left: 1.25rem;
        border-radius: var(--radius-md);
        border: 1px solid rgba(255, 255, 255, 0.1);
        background-color: rgba(15, 23, 42, 0.6);
        color: #F8FAFC;
    }

    .form-floating > .form-control:focus {
        border-color: var(--danger);
        background-color: rgba(15, 23, 42, 0.9);
        box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
        color: white;
    }
    
    .form-floating > .form-control:focus ~ label,
    .form-floating > .form-control:not(:placeholder-shown) ~ label {
        color: #CBD5E1;
        background-color: transparent;
    }

    .btn-admin {
        width: 100%;
        padding: 0.875rem;
        font-size: 1.1rem;
        margin-top: 1rem;
        border-radius: var(--radius-md);
        background: linear-gradient(135deg, var(--danger) 0%, #B91C1C 100%);
        border: none;
        color: white;
        font-weight: 600;
        box-shadow: 0 4px 14px 0 rgba(239, 68, 68, 0.39);
        transition: all 0.3s;
    }
    
    .btn-admin:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
        background: linear-gradient(135deg, #B91C1C 0%, #991B1B 100%);
    }

    .auth-links {
        text-align: center;
        margin-top: 2rem;
        font-size: 0.9rem;
    }

    .auth-links a {
        color: #94A3B8;
        text-decoration: none;
        transition: color 0.2s;
    }

    .auth-links a:hover {
        color: #F8FAFC;
    }
</style>
{% endblock %}

{% block content %}
<div class="admin-auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <i class="bi bi-shield-lock-fill"></i>
            <h1>Admin Portal</h1>
            <p>Authorized personnel only</p>
        </div>

        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" name="username" placeholder="Admin Username" required autofocus>
                <label for="username">Admin Username</label>
            </div>
            
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                <label for="password">Security Key</label>
            </div>

            <button type="submit" class="btn btn-admin">Authenticate</button>
        </form>

        <div class="auth-links">
            <a href="{{ url_for('login') }}"><i class="bi bi-arrow-left me-1"></i> Return to Student Login</a>
        </div>
    </div>
</div>
{% endblock %}
