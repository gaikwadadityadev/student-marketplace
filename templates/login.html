{% extends "base.html" %}

{% block title %}Sign In - Student Marketplace{% endblock %}

{% block extra_css %}
<style>
    .auth-page {
        min-height: calc(100vh - 150px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1rem;
        background: radial-gradient(circle at top right, rgba(79, 70, 229, 0.05), transparent 40%),
                    radial-gradient(circle at bottom left, rgba(236, 72, 153, 0.05), transparent 40%);
    }

    .auth-card {
        background: var(--surface);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-xl);
        border: 1px solid rgba(255, 255, 255, 0.5);
        width: 100%;
        max-width: 480px;
        padding: 3rem;
        position: relative;
        overflow: hidden;
        animation: fadeInUp 0.5s ease-out;
    }

    .auth-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 6px;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
    }

    .auth-header {
        text-align: center;
        margin-bottom: 2.5rem;
    }

    .auth-header i {
        font-size: 2.5rem;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 1rem;
        display: inline-block;
    }

    .auth-header h1 {
        font-size: 1.75rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
    }

    .auth-header p {
        color: var(--text-muted);
        font-size: 0.95rem;
    }

    .form-floating > label {
        color: var(--text-muted);
        padding-left: 1.25rem;
    }

    .form-floating > .form-control {
        padding-left: 1.25rem;
        border-radius: var(--radius-md);
        border: 2px solid var(--border-color);
        background-color: var(--bg-main);
    }

    .form-floating > .form-control:focus {
        border-color: var(--primary);
        background-color: var(--surface);
        box-shadow: none;
    }

    .btn-auth {
        width: 100%;
        padding: 0.875rem;
        font-size: 1.1rem;
        margin-top: 1rem;
        border-radius: var(--radius-md);
    }

    .auth-divider {
        display: flex;
        align-items: center;
        margin: 2rem 0;
        color: var(--text-muted);
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .auth-divider::before, .auth-divider::after {
        content: '';
        flex: 1;
        border-top: 1px solid var(--border-color);
    }

    .auth-divider span {
        padding: 0 1rem;
    }

    .auth-links {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.95rem;
    }

    .auth-links a {
        font-weight: 600;
    }

    .admin-link {
        position: absolute;
        bottom: 1.5rem;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 0.85rem;
    }

    .admin-link a {
        color: var(--text-muted);
        text-decoration: none;
    }

    .admin-link a:hover {
        color: var(--primary);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <i class="bi bi-person-circle"></i>
            <h1>Welcome Back</h1>
            <p>Sign in to your student account</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" name="username" placeholder="Username" required autofocus>
                <label for="username">Username or Email</label>
            </div>
            
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                <label for="password">Password</label>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 px-1">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label text-muted small" for="rememberMe">
                        Remember me
                    </label>
                </div>
                <a href="#" class="small fw-medium">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-auth">Sign In</button>
        </form>

        <div class="auth-divider">
            <span>New here?</span>
        </div>

        <div class="auth-links mb-4">
            <span class="text-muted">Don't have an account?</span> 
            <a href="{{ url_for('register') }}">Create one now</a>
        </div>

        <div class="admin-link">
            <a href="{{ url_for('admin_login') }}"><i class="bi bi-shield-lock me-1"></i>Admin Portal</a>
        </div>
    </div>
</div>
{% endblock %}
