services:
  - type: web
    name: student-marketplace
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "False"

      # SECRET_KEY must be a FIXED value — NOT generateValue (which rotates on every deploy)
      # Set this manually once in Render Dashboard → Environment → SECRET_KEY
      - key: SECRET_KEY
        value: "StudentMarketplace-SuperSecret-2024-FixedKey-DoNotChange"

      - key: WTF_CSRF_SECRET_KEY
        value: "StudentMarketplace-CSRF-2024-FixedKey"

      - key: SESSION_COOKIE_SECURE
        value: "True"

      - key: DATABASE_URL
        fromDatabase:
          name: student-marketplace-db
          property: connectionString

      # ── Database (Railway MySQL) — fill in Render Dashboard ──
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DB
        sync: false
      - key: MYSQL_PORT
        value: "3306"

      # ── Admin credentials seeded on first startup ──
      - key: ADMIN_USERNAME
        value: "Aditya"
      - key: ADMIN_PASSWORD
        value: "Aditya@2103"
      - key: ADMIN_EMAIL
        value: "admin@marketplace.com"

      # ── Setup token for /setup-admin reset route ──
      - key: SETUP_TOKEN
        value: "setup2024"

      - key: CORS_ORIGINS
        value: "*"
      - key: MAX_CONTENT_LENGTH
        value: "16777216"

databases:
  - name: student-marketplace-db
    databaseName: student_marketplace
    user: student_marketplace_user
    plan: free
